<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 Metaverso</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="selector">
        <h2>🌟 Elige tu Avatar</h2>
        <input type="text" id="nombre-input" placeholder="✏️ Tu nombre..." maxlength="15">
        <div class="avatar-grid" id="avatar-grid">
            <span class="avatar-opcion" data-avatar="👾">👾</span>
            <span class="avatar-opcion" data-avatar="🤖">🤖</span>
            <span class="avatar-opcion" data-avatar="👽">👽</span>
            <span class="avatar-opcion" data-avatar="🧙">🧙</span>
            <span class="avatar-opcion" data-avatar="🦸">🦸</span>
            <span class="avatar-opcion" data-avatar="🐉">🐉</span>
            <span class="avatar-opcion" data-avatar="🚀">🚀</span>
            <span class="avatar-opcion" data-avatar="👻">👻</span>
            <span class="avatar-opcion" data-avatar="🎃">🎃</span>
            <span class="avatar-opcion" data-avatar="🧝">🧝</span>
            <span class="avatar-opcion" data-avatar="🧞">🧞</span>
            <span class="avatar-opcion" data-avatar="🦄">🦄</span>
            <span class="avatar-opcion" data-avatar="🐱">🐱</span>
            <span class="avatar-opcion" data-avatar="🐺">🐺</span>
            <span class="avatar-opcion" data-avatar="🦊">🦊</span>
        </div>
        <button id="btn-ingresar">🚀 Ingresar</button>
    </div>

    <div id="contador">👥 <span id="num-usuarios">1</span></div>
    
    <div id="info">🎮 WASD para mover</div>

    <div id="controles">
        <div class="grupo-botones">
            <button class="btn-control" id="btn-arriba">▲</button>
            <button class="btn-control" id="btn-abajo">▼</button>
        </div>
        <div class="grupo-botones">
            <button class="btn-control" id="btn-izquierda">◀</button>
            <button class="btn-control" id="btn-derecha">▶</button>
        </div>
    </div>
    <div id="chat-container" style="position: absolute; bottom: 100px; left: 20px; z-index: 150; width: 280px; max-width: 80%;">
        <div id="chat-mensajes" style="background: rgba(0,0,0,0.7); border-radius: 12px; padding: 10px; max-height: 150px; overflow-y: auto; margin-bottom: 8px; border: 1px solid rgba(0,255,136,0.3);">
            <div style="color: #888; font-size: 12px; text-align: center; padding: 5px;">💬 Bienvenido al chat</div>
        </div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 2px solid rgba(0,255,136,0.5); background: rgba(0,0,0,0.7); color: white; font-size: 14px; outline: none;">
            <button id="chat-enviar" style="padding: 8px 16px; border-radius: 20px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer;">Enviar</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js"></script>
 <script src="script.js"></script>
    
</body>
</html>
